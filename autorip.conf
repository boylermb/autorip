# /etc/autorip/autorip.conf
# autorip configuration — edit this file then restart services:
#   sudo systemctl restart autorip-agent
#   sudo systemctl restart transcode-worker.timer  # (GPU node only)

# ---------- Output paths ----------
# Root directory for all ripped media.  Subdirectories are created automatically:
#   $OUTPUT_BASE/Video/Movies/
#   $OUTPUT_BASE/Video/TV/
#   $OUTPUT_BASE/Audio/Music/
#   $OUTPUT_BASE/.autorip-staging/   (temporary rip staging)
#   $OUTPUT_BASE/.autorip-queue/     (transcode job queue)
OUTPUT_BASE="/srv/nas/Media"

# ---------- Video ripping ----------
# Minimum title length in seconds — titles shorter than this are skipped
# (menus, trailers, FBI warnings, etc.)
MIN_TITLE_SECONDS=120

# ---------- TV show numbering ----------
# Assumed episodes per disc for TV season numbering offset.
# Disc 1 → E01-E04, Disc 2 → E05-E08, etc.
# Adjust if your shows typically have more/fewer episodes per disc.
EPISODES_PER_DISC=4

# ---------- Movie identification ----------
# mnamer format string for movie renaming (Jellyfin-compatible).
# See https://github.com/jkwill87/mnamer/wiki/Formatting
MNAMER_MOVIE_FORMAT="{name} ({year})/{name} ({year}){extension}"

# ---------- Audio CD ----------
# Output format: mp3, flac, ogg, opus, aac
CD_FORMAT=mp3

# Parallel encoding processes for abcde
MAX_ENCODE_PROCS=2

# ---------- API agent ----------
# Port for the autorip status/control API on each node
AGENT_PORT=7800

# ---------- MakeMKV ----------
# Version to build from source (only used by `make install-makemkv`)
MAKEMKV_VERSION="1.18.3"

# ---------- systemd sandboxing ----------
# Space-separated list of paths the autorip services need write access to.
# Must include the NFS mount points and any other writable paths.
WRITABLE_PATHS="/srv/nas /srv/nfs/data"
